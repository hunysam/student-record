<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>학생 운동기록 조회</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { width: 100%; background: #4A90E2; padding: 20px 0; text-align: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; border-radius: 0 0 20px 20px; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 800; }
    .header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }
    .container { width: 90%; max-width: 400px; padding-bottom: 40px; }
    
    .search-box { background: white; padding: 25px 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .search-box h2 { font-size: 18px; color: #2c3e50; margin-top: 0; text-align: center; margin-bottom: 20px; }
    
    input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eef2f5; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #fafbfc; transition: 0.3s; text-align: center; }
    input:focus { outline: none; border-color: #4A90E2; background: white; }
    
    .btn-search { width: 100%; background: #4A90E2; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4); transition: 0.2s; }
    .btn-search:active { transform: scale(0.97); }
    
    .result-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .student-title { font-size: 18px; font-weight: 800; color: #2c3e50; border-bottom: 2px solid #f0f4f8; padding-bottom: 12px; margin-top: 0; margin-bottom: 15px; text-align: center; }
    
    .sport-row { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer; border: 1px solid #eee; }
    .sport-header { display: flex; justify-content: space-between; align-items: center; }
    .sport-name { font-size: 16px; font-weight: bold; color: #34495e; }
    .sport-total { font-size: 20px; font-weight: 900; color: #4A90E2; margin: 0 10px; }
    .level-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; }
    
    .history-area { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd; }
    .history-title { font-size: 12px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; text-align: center; }
    .chart-container { display: flex; align-items: flex-end; justify-content: space-around; height: 70px; gap: 5px; }
    .chart-bar-wrap { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; flex: 1; }
    .chart-value { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 4px; }
    .chart-bar { width: 100%; max-width: 20px; border-radius: 4px 4px 0 0; opacity: 0.8; }
    .chart-date { font-size: 10px; color: #95a5a6; margin-top: 4px; }
    
    #loading { display: none; text-align: center; padding: 20px; color: #7f8c8d; font-weight: bold; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .creator-mark {
      position: fixed; bottom: 8px; left: 0; width: 100%; text-align: center; font-size: 12px; color: #b2bec3; z-index: 9999; pointer-events: none; font-weight: 600; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🏆 학생 운동기록 조회</h1>
  <p>이름과 비밀번호를 입력해주세요</p>
</div>

<div class="container">
  <div class="search-box">
    <h2>내 기록 확인하기</h2>
    <input type="text" id="studentName" placeholder="학생 이름 (예: 홍길동)">
    <input type="password" id="studentPin" placeholder="비밀번호(PIN) 4자리" onkeypress="if(event.keyCode==13) searchRecords()">
    <button class="btn-search" onclick="searchRecords()">조회하기</button>
  </div>

  <div id="loading"><span class="material-icons" style="animation: spin 1s linear infinite;">sync</span><br>데이터를 불러오는 중입니다...</div>
  <div id="resultArea"></div>
</div>

<div class="creator-mark">ⓒ Created by hunysam</div>

<script>
  // 💡 중복 없이 단 한 번만 선언! (가장 중요)
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyut1CvhMzwvgeIXZ1ZpZoLOrFrndZCDJ5dXehA8WA0VZ-VUdxHn_AYPy7pzDn1DupE/exec";

  const els = {
    nameInput: document.getElementById('studentName'),
    pinInput: document.getElementById('studentPin'),
    resultArea: document.getElementById('resultArea'),
    loading: document.getElementById('loading')
  };

  async function searchRecords() {
    const name = els.nameInput.value.trim();
    const pin = els.pinInput.value.trim();
    
    if (!name) { alert("이름을 입력해주세요."); els.nameInput.focus(); return; }
    if (!pin) { alert("비밀번호를 입력해주세요."); els.pinInput.focus(); return; }

    els.resultArea.innerHTML = '';
    els.loading.style.display = 'block';

try {
      // 💡 교사용 페이지와 똑같이 안전한 POST 방식으로 변경!
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'searchStudent', // 구글 서버에 있는 함수 이름
          args: [name, pin]        // 이름과 비밀번호를 배열로 묶어서 전달
        })
      });
      
      const res = await response.json(); 
      els.loading.style.display = 'none';

      // 통신 자체는 성공했지만 서버 내부 에러가 났을 때
      if (!res.success) {
        els.resultArea.innerHTML = `<div class="result-card" style="text-align:center; color:#e74c3c; font-weight:bold;">${res.error}</div>`;
        return;
      }

      const dataArray = res.data; // 서버가 보내준 진짜 결과 데이터
      
      // 구글 서버에서 보낸 에러 메시지(예: 학생 정보 없음) 처리
      if (dataArray.error) {
        els.resultArea.innerHTML = `<div class="result-card" style="text-align:center; color:#e74c3c; font-weight:bold;">${dataArray.error}</div>`;
        return;
      }

      // 화면에 정상적으로 기록 그려주기
      const finalHtml = dataArray.map((data, index) => {
        let cardHtml = `<div class="result-card"><h3 class="student-title">🧑‍🎓 ${data.studentInfo}</h3>`;
        
        if (!data.results || data.results.length === 0) {
          cardHtml += `<p style="text-align:center; color:#7f8c8d;">신청한 운동 종목이 없습니다.</p>`;
        } else {
          cardHtml += data.results.map((r, sIndex) => {
            const colors = { "초보": "#2ecc71", "고수": "#f39c12", "지존": "#e74c3c" };
            const color = colors[r.level] || "#95a5a6";
            
            let historyData = [];
            const dataset = data.recentHistory?.datasets?.find(ds => ds.label === r.sport);
            
            if (dataset?.data && data.recentHistory?.labels) {
              data.recentHistory.labels.forEach((label, i) => {
                if (dataset.data[i] > 0) historyData.push({ date: label, score: dataset.data[i] });
              });
            }
            
            let historyHtml = "";
            if (historyData.length === 0) {
              historyHtml = "<div style='text-align:center; color:#95a5a6; font-size:13px;'>최근 기록이 없습니다.</div>";
            } else {
              const maxScore = Math.max(...historyData.map(h => h.score), 1);
              const barsHtml = historyData.map(h => {
                const height = Math.max((h.score / maxScore) * 50, 4);
                return `<div class="chart-bar-wrap"><span class="chart-value">${h.score}</span><div class="chart-bar" style="height:${height}px; background-color:${color};"></div><span class="chart-date">${h.date}</span></div>`;
              }).join('');
              historyHtml = `<div class="history-title">📈 최근 7일 기록 흐름</div><div class="chart-container">${barsHtml}</div>`;
            }

            return `
              <div class="sport-row" onclick="toggleHistory('hist_${index}_${sIndex}')">
                <div class="sport-header">
                  <span class="sport-name">${r.sport} <span style="font-size:11px; color:#aaa;">(▼)</span></span>
                  <div><span class="sport-total">${r.total}</span> <span class="level-badge" style="background-color:${color};">${r.level}</span></div>
                </div>
                <div id="hist_${index}_${sIndex}" class="history-area">${historyHtml}</div>
              </div>`;
          }).join('');
        }
        return cardHtml + `</div>`;
      }).join('');

      els.resultArea.innerHTML = finalHtml;
      
    } catch (error) {
      els.loading.style.display = 'none';
      els.resultArea.innerHTML = `<div class="result-card" style="text-align:center; color:#e74c3c; font-weight:bold;">❌ 서버와 통신 중 오류가 발생했습니다.<br>잠시 후 다시 시도해주세요.</div>`;
      console.error(error);
    }
  }

  function toggleHistory(id) {
    const el = document.getElementById(id);
    if(el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }
</script>
</body>
</html>
