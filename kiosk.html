<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 체육 키오스크</title>
    <style>
      :root {
        --primary-color: #4CAF50; 
        --primary-dark: #388E3C;
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #333333;
        --text-sub: #777777;
        --border-color: #e0e0e0;
        --radius: 12px;
      }
      body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
      .container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; text-align: center; }
      .header { background-color: var(--primary-color); color: white; padding: 20px 0; font-size: 24px; font-weight: bold; }
      .content-area { padding: 30px; }
      .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
      .tab-btn { flex: 1; padding: 15px 5px; font-size: 16px; cursor: pointer; border: 2px solid var(--border-color); border-radius: var(--radius); background-color: var(--card-bg); color: var(--text-sub); font-weight: bold; transition: all 0.3s ease; }
      .tab-btn.active { background-color: rgba(76, 175, 80, 0.1); border-color: var(--primary-color); color: var(--primary-color); }
      .input-group { margin-bottom: 20px; text-align: left; }
      .input-group label { display: block; font-size: 14px; color: var(--text-sub); margin-bottom: 8px; font-weight: bold; }
      input, select { width: 100%; font-size: 18px; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; background-color: #fafafa; }
      input:focus, select:focus { outline: none; border-color: var(--primary-color); background-color: #fff; }
      
      button.submit-btn { width: 100%; font-size: 20px; font-weight: bold; padding: 16px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
      button.batch-end-btn { width: 100%; font-size: 16px; font-weight: bold; padding: 12px; background-color: #E53935; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s;}
      button.batch-end-btn:hover { background-color: #C62828; }
      
      #status { margin-top: 25px; font-size: 18px; font-weight: bold; min-height: 30px; padding: 15px; border-radius: 8px; background-color: #f9f9f9; color: var(--text-main); word-break: keep-all;}
      .hidden { display: none !important; }
      .desc-text { color: var(--text-sub); font-size: 15px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">🏆 스마트 체육 키오스크</div>
      
      <div class="content-area">
        <div class="tab-container">
          <button id="btnRun" class="tab-btn active" onclick="switchTab('run')">🏃 달리기 모드</button>
          <button id="btnKiosk" class="tab-btn" onclick="switchTab('kiosk')">💪 타 종목 자율 기록</button>
        </div>

        <div id="runMode">
          <p class="desc-text">학생들이 통과하면 개별적으로 기록이 누적됩니다.<br>(※ 10분간 기록이 없으면 개별 자동 종료)</p>
          <div class="input-group">
            <input type="text" id="rfidInput" placeholder="태그 스캔 대기중..." autofocus>
          </div>
          <button class="batch-end-btn" onclick="endAllRunning()">🛑 전체 달리기 일괄 종료</button>
        </div>

        <div id="kioskMode" class="hidden">
          <p class="desc-text" style="color:var(--primary-dark); font-weight:bold;">※ 이곳에 기록을 제출하면 해당 학생의 달리기는 자동 종료됩니다.</p>
          <div class="input-group"><label>태그 번호</label><input type="text" id="kioskTag" placeholder="본인 태그 (예: TAG001)"></div>
          <div class="input-group"><label>운동 종목</label><select id="kioskExercise"><option>로딩 중...</option></select></div>
          <div class="input-group"><label>오늘의 기록</label><input type="number" id="kioskScore" placeholder="기록 (숫자만 입력)"></div>
          <button class="submit-btn" id="submitBtn" onclick="submitKiosk()">기록 제출하기</button>
        </div>

        <div id="status">상태 대기 중...</div>
      </div>
    </div>

    <script>
      // 🚨 [매우 중요] 선생님의 구글 앱스 스크립트 웹앱 주소(exec) 입력!
      const SCRIPT_URL = "여기에_선생님의_구글웹앱_EXEC_주소_입력";
      
      var statusDiv = document.getElementById("status");

      // 🧠 프론트엔드 상태 관리 엔진 (핵심)
      let activeTags = {};      // 현재 달리고 있는 태그 { "TAG001": 마지막스캔시간(ms) }
      let finishedTags = new Set(); // 완전히 종료된 태그 목록 (블랙리스트)

      async function callGoogleScript(actionName, argsArray = []) {
        try {
          const response = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: actionName, args: argsArray }) });
          const result = await response.json();
          if (!result.success) throw new Error(result.error);
          return result.data;
        } catch (error) {
          console.error(error);
          return null;
        }
      }

      window.onload = async function() {
        const list = await callGoogleScript('getKioskExerciseList');
        if (list) {
          var selectBox = document.getElementById("kioskExercise");
          selectBox.innerHTML = "";
          for(var i = 0; i < list.length; i++) {
            var option = document.createElement("option"); option.value = list[i]; option.text = list[i]; selectBox.appendChild(option);
          }
        }
      };

      function switchTab(mode) {
        document.getElementById('runMode').classList.add('hidden');
        document.getElementById('kioskMode').classList.add('hidden');
        document.getElementById('btnRun').classList.remove('active');
        document.getElementById('btnKiosk').classList.remove('active');

        if(mode === 'run') {
          document.getElementById('runMode').classList.remove('hidden');
          document.getElementById('btnRun').classList.add('active');
          document.getElementById('rfidInput').focus();
          statusDiv.innerHTML = "🏃 달리기 측정 준비 완료 (다른 학생들은 계속 달릴 수 있습니다)";
        } else {
          document.getElementById('kioskMode').classList.remove('hidden');
          document.getElementById('btnKiosk').classList.add('active');
          statusDiv.innerHTML = "💪 자율 기록 제출 준비 완료";
        }
      }

      // [핵심] RFID 대량 스캔 처리 로직
      document.getElementById("rfidInput").addEventListener("keypress", async function(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          var tagId = this.value.trim();
          this.value = ""; // 스캔 즉시 입력창 비우기 (다음 사람을 위해)

          if(tagId === "") return;
          
          const now = Date.now();

          // 1. 이미 종료 처리된 태그는 완전히 무시
          if (finishedTags.has(tagId)) return;

          // 2. 10분(600000ms) 이상 변화 없으면 개별 종료 처리
          if (activeTags[tagId] && (now - activeTags[tagId] > 600000)) {
            finishedTags.add(tagId);
            delete activeTags[tagId];
            statusDiv.innerHTML = `🛑 [${tagId}] 10분 경과로 달리기가 자동 종료되었습니다.`;
            statusDiv.style.color = "#E53935";
            return;
          }

          // 3. 10초(10000ms) 쿨타임 무시 (UHF 리더기 중복 스캔 완벽 방어)
          if (activeTags[tagId] && (now - activeTags[tagId] < 10000)) {
            return; // 10초 내 스캔은 아무 화면 변화 없이 조용히 무시
          }

          // --- 검증 통과 (구글 시트로 기록 전송) ---
          activeTags[tagId] = now; // 마지막 스캔 시간 업데이트
          statusDiv.innerHTML = "⏳ " + tagId + " 기록 업데이트 중..."; 
          statusDiv.style.color = "var(--text-sub)";
          
          const resultMsg = await callGoogleScript('recordRfidRun', [tagId]);
          if(resultMsg) {
            statusDiv.innerHTML = resultMsg;
            if(resultMsg.includes("⚠️")) statusDiv.style.color = "#E53935";
            else statusDiv.style.color = "var(--primary-dark)";
          }
        }
      });

      // 자율 기록 제출 (달리기 개별 종료 연동)
      async function submitKiosk() {
        var tagId = document.getElementById("kioskTag").value.trim();
        var exercise = document.getElementById("kioskExercise").value;
        var score = document.getElementById("kioskScore").value.trim();
        if(tagId === "" || score === "") { alert("태그 번호와 기록을 모두 입력해주세요!"); return; }

        statusDiv.innerHTML = "⏳ 기록 전송 중..."; 
        document.getElementById("submitBtn").disabled = true;

        // 타 종목 입력 시, 해당 학생은 달리기를 끝낸 것으로 간주하고 달리기 종료 명단에 추가
        finishedTags.add(tagId);
        delete activeTags[tagId];

        const resultMsg = await callGoogleScript('recordKioskExercise', [tagId, exercise, score]);
        if(resultMsg) {
          statusDiv.innerHTML = resultMsg;
          if(resultMsg.includes("⚠️")) {
             statusDiv.style.color = "#E53935";
          } else {
             statusDiv.style.color = "var(--primary-dark)";
             document.getElementById("kioskTag").value = "";
             document.getElementById("kioskScore").value = "";
             
             // 2초 뒤에 다시 달리기 측정 화면으로 자동 복귀 (다른 학생을 위해)
             setTimeout(() => switchTab('run'), 2000); 
          }
        }
        document.getElementById("submitBtn").disabled = false;
      }

      // 일괄 종료 버튼
      function endAllRunning() {
        if(confirm("현재 진행 중인 모든 학생의 달리기를 종료하시겠습니까?\n(다음 반 수업을 시작하려면 화면을 새로고침 하세요.)")) {
          // 달리고 있던 모든 태그를 종료 명단으로 이동
          for(let tag in activeTags) {
            finishedTags.add(tag);
          }
          activeTags = {}; // 활성 태그 초기화
          statusDiv.innerHTML = "🛑 모든 달리기가 일괄 종료되었습니다. 이제 태그를 인식하지 않습니다.";
          statusDiv.style.color = "#E53935";
          document.getElementById('rfidInput').focus();
        }
      }
    </script>
  </body>
</html>
