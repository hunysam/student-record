<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 체육 키오스크</title>
    <style>
      :root {
        --primary-color: #4CAF50; --primary-dark: #388E3C;
        --blue-team: #1E88E5; --red-team: #E53935;
        --bg-color: #f4f7f6; --card-bg: #ffffff;
        --text-main: #333333; --text-sub: #777777; --border-color: #e0e0e0;
        --radius: 12px;
      }
      body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
      .container { width: 100%; max-width: 650px; background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; text-align: center; position: relative;}
      .header { background-color: var(--primary-color); color: white; padding: 20px 0; font-size: 24px; font-weight: bold; }
      .content-area { padding: 30px; }
      
      /* 메인 탭 */
      .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
      .tab-btn { flex: 1; padding: 15px 5px; font-size: 18px; cursor: pointer; border: 2px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); color: var(--text-sub); font-weight: bold; transition: all 0.3s ease; }
      .tab-btn.active { background-color: rgba(76, 175, 80, 0.1); border-color: var(--primary-color); color: var(--primary-color); }
      
      /* 공통 요소 */
      .input-group { margin-bottom: 20px; text-align: left; position: relative;}
      .input-group label { display: block; font-size: 15px; color: var(--text-sub); margin-bottom: 8px; font-weight: bold; }
      input, select { width: 100%; font-size: 18px; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; background-color: #fafafa; text-align: center; font-weight:bold; color:var(--text-main);}
      input:focus, select:focus { outline: none; border-color: var(--primary-color); background-color: #fff; }
      
      button.submit-btn { width: 100%; font-size: 20px; font-weight: bold; padding: 16px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
      button.batch-end-btn { width: 100%; font-size: 16px; font-weight: bold; padding: 12px; background-color: #E53935; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s;}
      
      #status { margin-top: 25px; font-size: 18px; font-weight: bold; min-height: 30px; padding: 15px; border-radius: 8px; background-color: #f9f9f9; color: var(--text-main); word-break: keep-all;}
      .hidden { display: none !important; }
      .desc-text { color: var(--text-sub); font-size: 15px; margin-bottom: 15px; line-height:1.5;}

      /* 상단 컨트롤러 (시작/종료) */
      .controls-row { display: flex; gap: 10px; margin-bottom: 20px; }
      .btn-start { flex: 1; background-color: var(--primary-color); color: white; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
      .btn-stop { flex: 1; background-color: #E53935; color: white; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
      .game-header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
      .btn-info { background-color: #0288D1; color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; }

      /* 모달(설명창) CSS */
      .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; border-radius: var(--radius); }
      .modal-content { background: white; padding: 25px; border-radius: 12px; width: 80%; max-width: 400px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
      .modal-title { font-size: 20px; font-weight: bold; margin-top: 0; color: var(--primary-dark); border-bottom: 2px solid var(--border-color); padding-bottom: 10px;}
      .modal-body { font-size: 15px; line-height: 1.6; color: var(--text-main); margin: 15px 0; word-break: keep-all; }
      .btn-close-modal { width: 100%; padding: 12px; background: #555; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

      /* 게임 및 측정 UI 전용 CSS */
      .scoreboard { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding: 20px; border-radius: 12px; background-color: #f0f0f0; }
      .team-box { width: 45%; border-radius: 12px; padding: 15px 0; color: white; }
      .team-blue { background-color: var(--blue-team); box-shadow: 0 4px 10px rgba(30, 136, 229, 0.4); }
      .team-red { background-color: var(--red-team); box-shadow: 0 4px 10px rgba(229, 57, 53, 0.4); }
      .team-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
      .team-score { font-size: 40px; font-weight: 900; }
      
      .survivor-area { border: 2px solid #4CAF50; border-radius: 12px; padding: 15px; margin-bottom: 15px; min-height: 80px;}
      .zombie-area { border: 2px solid #E53935; border-radius: 12px; padding: 15px; background-color: #ffebee; min-height: 80px;}
      .badge-survivor { display: inline-block; background-color: #4CAF50; color: white; padding: 8px 12px; border-radius: 20px; margin: 5px; font-weight: bold; }
      .badge-zombie { display: inline-block; background-color: #333; color: #ff5252; padding: 8px 12px; border-radius: 20px; margin: 5px; font-weight: bold; text-decoration: line-through;}
      .timer-warn { color: #ffeb3b; } .timer-danger { color: #ff5252; animation: blink 1s infinite; }
      @keyframes blink { 50% { opacity: 0.5; } }

      .ranking-area { background: #fff; border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; max-height: 250px; overflow-y: auto; text-align: left; }
      .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 16px; font-weight: bold; align-items: center;}
      .rank-item:last-child { border-bottom: none; }
      .rank-1 { background-color: rgba(255, 215, 0, 0.1); color: #B8860B; } .rank-2 { background-color: rgba(192, 192, 192, 0.1); color: #708090; } .rank-3 { background-color: rgba(205, 127, 50, 0.1); color: #8B4513; }
      .rank-score { background: var(--primary-color); color: white; padding: 5px 12px; border-radius: 15px; font-size: 15px; }
      .rank-time { background: #0288D1; color: white; padding: 5px 12px; border-radius: 15px; font-size: 16px; font-family: monospace;}
      
      .live-timer { font-size: 45px; font-weight: 900; color: var(--primary-dark); margin: 15px 0; font-family: monospace; letter-spacing: 2px;}
    </style>
  </head>
  <body>
    <div class="container">
      
      <div id="infoModal" class="modal-overlay hidden">
        <div class="modal-content">
          <h3 class="modal-title" id="modalTitle">설명</h3>
          <div class="modal-body" id="modalBody">내용</div>
          <button class="btn-close-modal" onclick="closeModal()">확인</button>
        </div>
      </div>

      <div class="header">🏆 스마트 체육 키오스크</div>
      
      <div class="content-area">
        <div class="tab-container">
          <button id="btnBasic" class="tab-btn active" onclick="switchMainTab('basic')">🏃 측정 및 기록</button>
          <button id="btnGame" class="tab-btn" onclick="switchMainTab('game')">🎮 게임 모드</button>
        </div>

        <div id="globalInputArea" class="input-group" style="text-align: center;">
          <input type="text" id="globalRfidInput" placeholder="[리더기 스캔 대기] 직접 입력하여 테스트 가능" style="font-size:14px; padding:10px; background-color:#e8f5e9;">
        </div>

        <div id="basicModeArea">
          <div class="input-group">
            <label>정규 측정 항목 선택</label>
            <select id="basicSelect" onchange="changeBasicUI()">
              <option value="basic1">1. 달리기 (바퀴 수 누적 측정)</option>
              <option value="basic2">2. 달리기 (초정밀 결승선 타이머)</option>
              <option value="basic3">3. 자율 운동 기록 (수동 제출)</option>
            </select>
          </div>

          <div id="basic1UI">
            <p class="desc-text">학생들이 통과할 때마다 바퀴 수가 자동 누적됩니다.<br>(※ 10분간 움직임이 없으면 자동 종료)</p>
            <button class="batch-end-btn" onclick="endActivity('basic1')">🛑 측정 일괄 종료 및 초기화</button>
          </div>

          <div id="basic2UI" class="hidden">
            <div class="controls-row">
              <button class="btn-start" onclick="startBasic2()">▶️ 타이머 시작</button>
              <button class="btn-stop" onclick="endActivity('basic2')">⏹️ 초기화</button>
            </div>
            <p class="desc-text" style="color:var(--primary-dark); font-weight:bold;">타이머가 돌아갈 때 태그를 찍으면 도착 시간이 기록됩니다.</p>
            <div class="live-timer" id="basic2Timer">00:00.00</div>
            <div class="ranking-area" id="basic2Ranking">
              <div style="color:var(--text-sub); text-align:center; padding:20px;">결승선 대기 중...</div>
            </div>
          </div>

          <div id="basic3UI" class="hidden">
            <p class="desc-text">자신의 태그 번호와 기록을 직접 입력하세요.</p>
            <div class="input-group"><label>태그 번호</label><input type="text" id="kioskTag" placeholder="본인 태그 (예: TAG001)"></div>
            <div class="input-group"><label>운동 종목</label><select id="kioskExercise"><option>로딩 중...</option></select></div>
            <div class="input-group"><label>오늘의 기록</label><input type="number" id="kioskScore" placeholder="기록 (숫자만 입력)"></div>
            <button class="submit-btn" id="submitBtn" onclick="submitKiosk()">기록 제출하기</button>
          </div>
        </div>

        <div id="gameModeArea" class="hidden">
          <div class="input-group">
            <div class="game-header-row">
              <label style="margin-bottom:0;">진행할 게임 선택</label>
              <button class="btn-info" onclick="openInfoModal()">ℹ️ 게임 설명 보기</button>
            </div>
            <select id="gameSelect" onchange="changeGameUI()">
              <option value="game1">1. 진지 점령전 (청백전)</option>
              <option value="game2">2. 좀비 생존 게임 (백신 스테이션)</option>
              <option value="game3">3. 미션 랭킹전 (런닝맨)</option>
            </select>
          </div>

          <div class="controls-row">
            <button class="btn-start" onclick="startGame()">▶️ 게임 시작</button>
            <button class="btn-stop" onclick="endActivity('game')">⏹️ 활동 종료</button>
          </div>

          <div id="game1UI">
            <div class="scoreboard">
              <div class="team-box team-blue"><div class="team-title">청팀 🔵</div><div class="team-score" id="scoreBlue">0</div></div>
              <div style="font-size: 24px; font-weight: bold; color: #555;">VS</div>
              <div class="team-box team-red"><div class="team-title">백팀 🔴</div><div class="team-score" id="scoreRed">0</div></div>
            </div>
          </div>

          <div id="game2UI" class="hidden">
            <div class="survivor-area">
              <h4 style="margin-top:0; color:#388E3C;">🏃‍♂️ 생존자 명단 (백신 유효)</h4>
              <div id="survivorList">대기 중...</div>
            </div>
            <div class="zombie-area">
              <h4 style="margin-top:0; color:#D32F2F;">🧟 좀비 감염자</h4>
              <div id="zombieList">아직 감염자가 없습니다.</div>
            </div>
          </div>

          <div id="game3UI" class="hidden">
            <h4 style="text-align:left; color:var(--primary-dark); margin-top:0;">🏆 실시간 미션 수행 랭킹</h4>
            <div class="ranking-area" id="rankingList">
              <div style="color:var(--text-sub); text-align:center; padding:20px;">게임을 시작하고 태그를 찍어주세요!</div>
            </div>
          </div>
        </div>

        <div id="status">상태 대기 중...</div>
      </div>
    </div>

    <script>
      // 🚨 [매우 중요] 선생님의 구글 앱스 스크립트 웹앱 주소(exec) 입력!
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyut1CvhMzwvgeIXZ1ZpZoLOrFrndZCDJ5dXehA8WA0VZ-VUdxHn_AYPy7pzDn1DupE/exec";
      var statusDiv = document.getElementById("status");

      // --- 상태 관리 변수 ---
      let currentMainTab = "basic"; // 'basic' or 'game'
      let currentBasic = "basic1"; 
      let currentGame = "game1";

      // Basic 1 (바퀴 수)
      let activeTags = {}; let finishedTags = new Set(); 
      // Basic 2 (타이머)
      let isBasic2Running = false; let basic2StartTime = 0; let basic2Results = []; let basic2Finished = new Set(); let basic2Interval;
      // Games
      let isGameRunning = false;
      let game1TeamMap = {}; let game1Cooldowns = {}; let scoreBlue = 0; let scoreRed = 0;
      let game2Survivors = {}; let game2Zombies = new Set(); let game2Interval; const SURVIVAL_TIME = 180000; // 3분
      let game3Scores = {}; let game3Cooldowns = {};

      const gameInfoData = {
        "game1": { title: "🔵🔴 1. 진지 점령전 (청백전)", desc: "처음 태그를 찍는 순서대로 청팀과 백팀에 번갈아가며 자동 배정됩니다.<br><br>태그를 찍을 때마다 자기 팀의 점수가 1점씩 올라갑니다. 제한 시간 동안 고지(리더기)를 더 많이 차지한 팀이 승리합니다.<br><br><span style='color:red;'>※ 꼼수 방지:</span> 한 번 찍으면 5초 동안은 연속으로 점수를 획득할 수 없습니다." },
        "game2": { title: "🧟‍♂️ 2. 좀비 생존 게임", desc: "게임을 시작하고 리더기를 찍으면 '생존자'로 등록되며 3분의 생존 타이머가 시작됩니다.<br><br>생존자는 타이머가 0초가 되기 전에 리더기로 도망쳐와서 다시 백신(태그)을 맞아야 생존 시간이 3분으로 리셋됩니다. 시간 내에 찍지 못하면 좀비로 변이됩니다!" },
        "game3": { title: "🏃‍♂️ 3. 미션 랭킹전 (런닝맨)", desc: "체육관 곳곳에 숨겨진 미션을 수행하고 돌아와서 리더기에 태그를 찍어 인증(스택 추가)하세요!<br><br>태그를 찍을 때마다 미션 수행 횟수가 1씩 올라가며, 실시간 1~꼴등 랭킹이 전광판에 자동 반영됩니다.<br><br><span style='color:red;'>※ 꼼수 방지:</span> 미션을 수행할 시간을 주기 위해 한 번 찍으면 10초 동안은 다시 찍을 수 없습니다." }
      };

      // --- 구글 통신 ---
      async function callGoogleScript(actionName, argsArray = []) {
        try {
          const response = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: actionName, args: argsArray }) });
          const result = await response.json();
          if (!result.success) throw new Error(result.error); return result.data;
        } catch (error) { return null; }
      }

      window.onload = async function() {
        const list = await callGoogleScript('getKioskExerciseList');
        if (list) {
          var selectBox = document.getElementById("kioskExercise"); selectBox.innerHTML = "";
          for(var i = 0; i < list.length; i++) {
            var option = document.createElement("option"); option.value = list[i]; option.text = list[i]; selectBox.appendChild(option);
          }
        }
        document.getElementById('globalRfidInput').focus();
      };

      // --- 메인 탭 전환 ---
      function switchMainTab(tab) {
        currentMainTab = tab;
        document.getElementById('basicModeArea').classList.add('hidden');
        document.getElementById('gameModeArea').classList.add('hidden');
        document.getElementById('btnBasic').classList.remove('active');
        document.getElementById('btnGame').classList.remove('active');

        if(tab === 'basic') {
          document.getElementById('basicModeArea').classList.remove('hidden');
          document.getElementById('btnBasic').classList.add('active');
          changeBasicUI(); // 현재 선택된 서브메뉴 UI 적용
        } else {
          document.getElementById('gameModeArea').classList.remove('hidden');
          document.getElementById('btnGame').classList.add('active');
          changeGameUI();
          statusDiv.innerHTML = "🎮 진행할 게임을 선택하고 시작을 눌러주세요.";
        }
      }

      // --- 서브 메뉴 UI 전환 ---
      function changeBasicUI() {
        currentBasic = document.getElementById("basicSelect").value;
        document.getElementById("basic1UI").classList.add("hidden"); document.getElementById("basic2UI").classList.add("hidden"); document.getElementById("basic3UI").classList.add("hidden");
        document.getElementById("globalInputArea").classList.remove("hidden"); // 기본적으로 리더기 입력창 노출

        if(currentBasic === "basic1") {
          document.getElementById("basic1UI").classList.remove("hidden");
          document.getElementById("globalRfidInput").focus();
          statusDiv.innerHTML = "🏃 달리기(바퀴 수) 측정 대기 중...";
        } else if(currentBasic === "basic2") {
          document.getElementById("basic2UI").classList.remove("hidden");
          document.getElementById("globalRfidInput").focus();
          statusDiv.innerHTML = "⏱️ 결승선 타이머 모드 (시작을 눌러주세요)";
        } else if(currentBasic === "basic3") {
          document.getElementById("basic3UI").classList.remove("hidden");
          document.getElementById("globalInputArea").classList.add("hidden"); // 수동 입력이므로 전역 리더기 숨김
          statusDiv.innerHTML = "💪 자율 운동 기록 제출 대기 중...";
        }
      }

      function changeGameUI() {
        currentGame = document.getElementById("gameSelect").value;
        document.getElementById("game1UI").classList.add("hidden"); document.getElementById("game2UI").classList.add("hidden"); document.getElementById("game3UI").classList.add("hidden");
        document.getElementById("globalInputArea").classList.remove("hidden");
        document.getElementById("globalRfidInput").focus();

        if(currentGame === "game1") document.getElementById("game1UI").classList.remove("hidden");
        else if(currentGame === "game2") document.getElementById("game2UI").classList.remove("hidden");
        else if(currentGame === "game3") document.getElementById("game3UI").classList.remove("hidden");
      }

      // --- 모달 로직 ---
      function openInfoModal() {
        const info = gameInfoData[currentGame];
        if(info) { document.getElementById('modalTitle').innerText = info.title; document.getElementById('modalBody').innerHTML = info.desc; document.getElementById('infoModal').classList.remove('hidden'); }
      }
      function closeModal() { document.getElementById('infoModal').classList.add('hidden'); document.getElementById('globalRfidInput').focus(); }

      // --- 기능 시작 / 종료 제어 ---
      function startBasic2() {
        isBasic2Running = true; basic2StartTime = Date.now(); basic2Results = []; basic2Finished = new Set(); updateBasic2UI();
        clearInterval(basic2Interval); document.getElementById('globalRfidInput').focus();
        statusDiv.innerHTML = "🚦 결승선 타이머 가동 중! 태그를 스캔하세요!"; statusDiv.style.color = "var(--primary-dark)";
        basic2Interval = setInterval(() => {
          if(!isBasic2Running) { clearInterval(basic2Interval); return; }
          let t = Date.now() - basic2StartTime;
          let m = String(Math.floor(t/60000)).padStart(2,'0'); let s = String(Math.floor((t%60000)/1000)).padStart(2,'0'); let ms = String(Math.floor((t%1000)/10)).padStart(2,'0');
          document.getElementById('basic2Timer').innerText = `${m}:${s}.${ms}`;
        }, 50);
      }

      function startGame() {
        isGameRunning = true; document.getElementById('globalRfidInput').focus();
        if(currentGame === "game1") {
          scoreBlue = 0; scoreRed = 0; game1TeamMap = {}; game1Cooldowns = {}; document.getElementById('scoreBlue').innerText = scoreBlue; document.getElementById('scoreRed').innerText = scoreRed;
          statusDiv.innerHTML = "🔥 진지 점령전이 시작되었습니다!";
        } else if(currentGame === "game2") {
          clearInterval(game2Interval); game2Survivors = {}; game2Zombies = new Set(); updateGame2UI();
          statusDiv.innerHTML = "🧟 좀비 게임 시작! 백신을 접종하세요!";
          game2Interval = setInterval(() => {
            if(!isGameRunning) { clearInterval(game2Interval); return; }
            const now = Date.now();
            for(let tag in game2Survivors) { if(game2Survivors[tag] < now) { game2Zombies.add(tag); delete game2Survivors[tag]; statusDiv.innerHTML = `🚨 [${tag}] 좀비 감염!`; statusDiv.style.color = "#E53935"; } }
            updateGame2UI();
          }, 1000);
        } else if(currentGame === "game3") {
          game3Scores = {}; game3Cooldowns = {}; updateGame3UI(); statusDiv.innerHTML = "🏃‍♂️ 미션 랭킹전 시작! 태그를 찍으세요!";
        }
        statusDiv.style.color = "var(--primary-dark)";
      }

      function endActivity(type) {
        if(!confirm("진행 중인 기록이나 활동을 종료/초기화 하시겠습니까?")) return;
        if(type === 'basic1') { 
          for(let tag in activeTags) finishedTags.add(tag); activeTags = {}; statusDiv.innerHTML = "🛑 달리기(바퀴 수) 누적이 초기화 되었습니다."; 
        } 
        else if(type === 'basic2') { 
          isBasic2Running = false; clearInterval(basic2Interval); statusDiv.innerHTML = "🛑 타이머가 정지되었습니다."; 
        }
        else if(type === 'game') { 
          isGameRunning = false; if(typeof game2Interval !== 'undefined') clearInterval(game2Interval); statusDiv.innerHTML = "🛑 게임 활동이 종료되었습니다."; 
        }
        statusDiv.style.color = "#E53935"; document.activeElement.blur(); 
      }

      // --- 중앙 집중식 RFID 입력 처리기 ---
      document.getElementById("globalRfidInput").addEventListener("keypress", async function(event) {
        if (event.key === "Enter") {
          event.preventDefault(); var tagId = this.value.trim(); this.value = ""; if(tagId === "") return;
          const now = Date.now();

          // [1] 측정 및 기록 모드일 때
          if (currentMainTab === 'basic') {
            if (currentBasic === "basic1") {
              if (finishedTags.has(tagId)) return;
              if (activeTags[tagId] && (now - activeTags[tagId] > 600000)) { finishedTags.add(tagId); delete activeTags[tagId]; return; }
              if (activeTags[tagId] && (now - activeTags[tagId] < 10000)) return; 
              activeTags[tagId] = now; statusDiv.innerHTML = "⏳ " + tagId + " 바퀴 수 업데이트 중..."; 
              const resultMsg = await callGoogleScript('recordRfidRun', [tagId]);
              if(resultMsg) { statusDiv.innerHTML = resultMsg; }
            } 
            else if (currentBasic === "basic2") {
              if(!isBasic2Running) return;
              if (basic2Finished.has(tagId)) { statusDiv.innerHTML = `⚠️ [${tagId}] 이미 통과했습니다!`; statusDiv.style.color = "#E53935"; return; }
              let elapsed = now - basic2StartTime; basic2Finished.add(tagId); basic2Results.push({ tag: tagId, time: elapsed });
              statusDiv.innerHTML = `🏁 [${tagId}] 결승선 통과!`; statusDiv.style.color = "#0288D1"; updateBasic2UI();
            }
          } 
          // [2] 게임 모드일 때
          else if (currentMainTab === 'game') {
            if(!isGameRunning) return;
            if(currentGame === "game1") {
              if (game1Cooldowns[tagId] && (now - game1Cooldowns[tagId] < 5000)) { statusDiv.innerHTML = `⚠️ 5초 쿨타임!`; return; }
              if (!game1TeamMap[tagId]) game1TeamMap[tagId] = (Object.keys(game1TeamMap).length % 2 === 0) ? "blue" : "red"; 
              game1Cooldowns[tagId] = now; const myTeam = game1TeamMap[tagId];
              if (myTeam === "blue") { scoreBlue++; document.getElementById('scoreBlue').innerText = scoreBlue; statusDiv.innerHTML = `🔵 청팀 득점!`; statusDiv.style.color = "var(--blue-team)"; } 
              else { scoreRed++; document.getElementById('scoreRed').innerText = scoreRed; statusDiv.innerHTML = `🔴 백팀 득점!`; statusDiv.style.color = "var(--red-team)"; }
            } 
            else if(currentGame === "game2") {
              if(game2Zombies.has(tagId)) { statusDiv.innerHTML = `🧟 [${tagId}] 이미 좀비입니다!`; return; }
              game2Survivors[tagId] = now + SURVIVAL_TIME; statusDiv.innerHTML = `💉 [${tagId}] 백신 투여 완료!`; statusDiv.style.color = "#4CAF50"; updateGame2UI();
            }
            else if(currentGame === "game3") {
              if (game3Cooldowns[tagId] && (now - game3Cooldowns[tagId] < 10000)) { statusDiv.innerHTML = `⚠️ [${tagId}] 미션을 더 수행하세요!`; return; }
              game3Cooldowns[tagId] = now; if(!game3Scores[tagId]) game3Scores[tagId] = 0; game3Scores[tagId]++;
              statusDiv.innerHTML = `✨ [${tagId}] 랭킹 스택 +1 추가!`; statusDiv.style.color = "#F57C00"; updateGame3UI();
            }
          }
        }
      });

      // --- 화면 갱신 엔진 ---
      function updateBasic2UI() {
        const rankingDiv = document.getElementById("basic2Ranking");
        if(basic2Results.length === 0) return;
        basic2Results.sort((a, b) => a.time - b.time); // 시간 오름차순
        let rHTML = "";
        basic2Results.forEach((item, index) => {
          let t = item.time; let m = String(Math.floor(t/60000)).padStart(2,'0'); let s = String(Math.floor((t%60000)/1000)).padStart(2,'0'); let ms = String(Math.floor((t%1000)/10)).padStart(2,'0');
          let rankClass = ""; let rankIcon = `${index + 1}등`;
          if(index === 0) { rankClass = "rank-1"; rankIcon = "🥇 1등"; } else if(index === 1) { rankClass = "rank-2"; rankIcon = "🥈 2등"; } else if(index === 2) { rankClass = "rank-3"; rankIcon = "🥉 3등"; }
          rHTML += `<div class="rank-item ${rankClass}"><span>${rankIcon} - ${item.tag}</span><span class="rank-time">${m}:${s}.${ms}</span></div>`;
        });
        rankingDiv.innerHTML = rHTML;
      }

      function updateGame2UI() {
        const survivorDiv = document.getElementById("survivorList"); const zombieDiv = document.getElementById("zombieList"); const now = Date.now();
        let sHTML = "";
        for(let tag in game2Survivors) {
          const timeLeftStr = Math.max(0, Math.ceil((game2Survivors[tag] - now) / 1000));
          const mins = String(Math.floor(timeLeftStr / 60)).padStart(2, '0'); const secs = String(timeLeftStr % 60).padStart(2, '0');
          let timerClass = ""; if(timeLeftStr <= 30) timerClass = "timer-danger"; else if(timeLeftStr <= 60) timerClass = "timer-warn";
          sHTML += `<span class="badge-survivor">${tag} <span class="${timerClass}">⏳ ${mins}:${secs}</span></span>`;
        }
        survivorDiv.innerHTML = sHTML || "백신 대기 중...";
        let zHTML = ""; game2Zombies.forEach(tag => { zHTML += `<span class="badge-zombie">🧟 ${tag}</span>`; });
        zombieDiv.innerHTML = zHTML || "아직 감염자가 없습니다.";
      }

      function updateGame3UI() {
        const rankingDiv = document.getElementById("rankingList");
        const sortedArray = Object.entries(game3Scores).sort((a, b) => b[1] - a[1]);
        if(sortedArray.length === 0) return;
        let rHTML = "";
        sortedArray.forEach((item, index) => {
          const tag = item[0]; const score = item[1];
          let rankClass = ""; let rankIcon = `${index + 1}등`;
          if(index === 0) { rankClass = "rank-1"; rankIcon = "🥇 1등"; } else if(index === 1) { rankClass = "rank-2"; rankIcon = "🥈 2등"; } else if(index === 2) { rankClass = "rank-3"; rankIcon = "🥉 3등"; }
          rHTML += `<div class="rank-item ${rankClass}"><span>${rankIcon} - ${tag}</span><span class="rank-score">${score} 스택</span></div>`;
        });
        rankingDiv.innerHTML = rHTML;
      }

      // --- 자율 운동 기록 제출 로직 (Basic 3) ---
      async function submitKiosk() {
        var tagId = document.getElementById("kioskTag").value.trim(); var exercise = document.getElementById("kioskExercise").value; var score = document.getElementById("kioskScore").value.trim();
        if(tagId === "" || score === "") { alert("입력칸을 채워주세요."); return; } 
        document.getElementById("submitBtn").disabled = true; 
        
        statusDiv.innerHTML = "⏳ 전송 중..."; const resultMsg = await callGoogleScript('recordKioskExercise', [tagId, exercise, score]);
        if(resultMsg) { 
          statusDiv.innerHTML = resultMsg; document.getElementById("kioskTag").value = ""; document.getElementById("kioskScore").value = ""; 
          // 제출 완료 후 다시 기본 달리기 측정 화면으로 복귀
          setTimeout(() => { document.getElementById("basicSelect").value = "basic1"; changeBasicUI(); }, 2000); 
        }
        document.getElementById("submitBtn").disabled = false;
      }
    </script>
  </body>
</html>
